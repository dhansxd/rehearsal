name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python3 -m unittest discover -v
      - run: python3 scripts/verify-public-evidence.py
      - run: ./scripts/verify-clean.sh
      - run: node --check web/app.js
      - run: python3 -m compileall -q rehearsal scripts tests
